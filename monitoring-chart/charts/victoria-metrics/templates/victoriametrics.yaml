apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vm-storage-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi # Adjust based on your retention needs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoria-metrics
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoria-metrics
  template:
    metadata:
      labels:
        app: victoria-metrics
    spec:
      containers:
      - name: victoria-metrics
        image: victoriametrics/victoria-metrics:v1.101.0
        ports:
        - containerPort: 8428
          name: http
        args:
          - "-storageDataPath=/storage"
          - "-retentionPeriod=1" # Retain data for 1 month
          - "-promscrape.config=/config/prometheus.yml"
        volumeMounts:
        - name: victoria-metrics-data
          mountPath: /storage
        # ...So we must mount the ConfigMap here
        - name: config-volume
          mountPath: /config
      volumes:
      - name: victoria-metrics-data
        persistentVolumeClaim:
          claimName: vm-storage-pvc
      # This links the ConfigMap to the "config-volume" name
      - name: config-volume
        configMap:
          name: vm-scrape-config
---
apiVersion: v1
kind: Service
metadata:
  name: victoria-metrics
  namespace: monitoring
spec:
  ports:
  - port: 8428
    targetPort: 8428
    protocol: TCP
    name: http
  selector:
    app: victoria-metrics
