global:
  namespace: 3t-app

frontend:
  replicaCount: 1
  service:
    annotations: {}
    type: NodePort
    port: 80
    targetPort: 8000
  ingress:
    className: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
    hosts:
      - host: dev.chart-example.local
        paths:
          # - path: /api
          #   pathType: Prefix
          #   backendService: three-tier-app-backend-service 
          #   backendPort: 8080
          - path: /
            pathType: Prefix
            backendService: three-tier-app-frontend-service
            backendPort: 80
            
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  autoscaling:
    enabled: false




podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: 
   capabilities:
     drop:
     - ALL
   readOnlyRootFilesystem: true
   runAsNonRoot: true
   runAsUser: 1000

service:
  annotations: {}  # This "empty map" tells Helm the key exists but has no data
  type: NodePort
  port: 80
  targetPort: 8000
  protocol: TCP

#ingress:
#  className: "nginx"
#  annotations:
#    nginx.ingress.kubernetes.io/rewrite-target: /
#  hosts:
#    - host: chart-example.local
#      paths:
#        - path: /api
#          pathType: Prefix
#          backendService: backend-service
#          backendPort: 8080
#        - path: /
#          pathType: Prefix
#          backendService: frontend-service
#          backendPort: 80
#  tls: []

ingress:
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: dev.chart-example.local
      paths:
        - path: /api
          pathType: Prefix
          # FIX: This must match the full name of your backend service
          backendService: three-tier-app-backend-service 
          backendPort: 8080
        - path: /
          pathType: Prefix
          # FIX: This must match the full name of your frontend service
          backendService: three-tier-app-frontend-service
          backendPort: 80




autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 50
volumes: []
volumeMounts: []
nodeSelector: {}

tolerations: []

affinity: {}
