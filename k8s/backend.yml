apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: 3t-app
spec:
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: dev126712/dockerized-three-tier-app-backend:d85e9675297521ee1646fcec0b553d0e2ec7f6b8
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URI
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DATABASE_URI
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
---

apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: 3t-app
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP

---

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: 3t-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: 3t-app
  labels:
    app: myapplication
data:
  DATABASE_URI: "mongodb://admin:pass@database-service.3t-app.svc.cluster.local:27017/mydatabase?authSource=admin"
