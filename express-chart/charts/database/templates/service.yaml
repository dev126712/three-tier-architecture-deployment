apiVersion: v1
kind: Service
metadata:
  name: database-service
  labels:
    {{- include "database.labels" . | nindent 4 }}
spec:
  clusterIP: None 
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: mongodb
  selector:
    {{- include "database.selectorLabels" . | nindent 4 }}
