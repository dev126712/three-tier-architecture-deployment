apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: 3t-app
  annotations:
    cloud.google.com/neg: {{ .Values.service.annotations | quote }}
spec:
  selector:
    app: frontend
  type: {{ .Values.service.type }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}