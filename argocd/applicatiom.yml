apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: three-tier-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dev126712/three-tier-architecture-deployment.git
    targetRevision: HEAD
    path: k8s          
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:         
      prune: true      
      selfHeal: true   